project_name: "ai_video_project"
aspect_ratio: "9:16"

llm_provider: "gemini"
llm_model: "gemini-2.5-flash"

tts:
  backend: "silero"
  fallback_backend: "silero"
  mode: "per_scene"
  quality_preset: "balanced"
  clear_memory_after_tts: true
  unload_tts_model_after_generation: true
  run_tts_before_visuals: true
  language: "ru"
  voice: "default"
  speed: 1.0
  emotion: "neutral"
  sample_rate: 24000
  format: "wav"
  normalize_text: true
  reference_audio_path: "voices/reference.wav"
  reference_text: ""
  use_voice_clone: true
  max_chars_per_chunk: 350
  pause_between_chunks_ms: 250
  local_tts_api_url: "http://127.0.0.1:8020/tts"

  f5_tts:
    model: "F5-TTS"
    device: "cuda"
    dtype: "float16"
    cfg_strength: 2.0
    sway_sampling_coef: -1.0
    speed: 1.0

  fish_speech:
    model_path: "checkpoints/fish-speech"
    device: "cuda"
    dtype: "float16"
    temperature: 0.7
    top_p: 0.8
    repetition_penalty: 1.1

  cosyvoice:
    model_path: "checkpoints/cosyvoice"
    device: "cuda"
    dtype: "float16"

  silero:
    voice: "baya"
    sample_rate: 24000
    speed: "medium"

  audio_file:
    path: "input_audio/voiceover.wav"

  replacements:
    "AI": "искусственный интеллект"
    "API": "эй-пи-ай"
    "URL": "ссылка"
    "404": "четыреста четыре"
    "403": "четыреста три"

tts_quality_presets:
  draft:
    f5_tts:
      nfe_step: 8
  balanced:
    f5_tts:
      nfe_step: 16
  high:
    f5_tts:
      nfe_step: 32

audio_postprocess:
  enabled: true
  normalize_loudness: true
  target_lufs: -14
  remove_silence: true
  max_silence_ms: 500
  add_compressor: true
  noise_reduction: false

visual_generator:
  mode: "image_prompts"
  style_preset: "cinematic_realistic"

render:
  visual_backend: "image_folder"
  fallback_backend: "none"
  model_preset: "z_image_turbo_gguf"
  acceleration_mode: "turbo"
  image_width: 576
  image_height: 1024
  final_width: 1080
  final_height: 1920
  steps: 6
  guidance_scale: 0.0
  seed: -1
  sampler: "euler"
  scheduler: "simple"
  lora_preset: "none"
  lora_strength: 0.7
  motion_preset: "slow_zoom_in"
  captions_enabled: true
  comfyui_url: "http://127.0.0.1:8188"
  comfyui_workflow_path: "workflows/z_image_turbo_gguf_6step.json"
  local_image_api_url: "http://127.0.0.1:8000/txt2img"
  image_folder_path: "input_images"
  stock_video_provider: "pexels"
  stock_video_orientation: "portrait"
  fallback_to_black: true
  clear_cuda_cache_between_scenes: true

huggingface:
  token_env: "HF_TOKEN"
  use_auth_token: true

captions:
  font_size: 90
  font_color: "white"
  font_face: "Arial-Bold"
  stroke_width: 3
  stroke_color: "black"
  position: "bottom_center"

style_presets:
  cinematic_realistic: "Cinematic realistic style, detailed composition, realistic lighting, professional video frame, high detail, natural textures."
  documentary: "Documentary style, authentic real-world look, natural lighting, journalistic, realistic details."
  luxury_commercial: "Premium commercial look, clean elegant composition, polished lighting, high-end advertising style."
  educational_clean: "Clean educational visual style, minimal background, clear subject, readable composition."
  dark_dystopian: "Dark near-future atmosphere, cinematic shadows, cold lighting, subtle technology, unsettling mood."
  kids_storybook: "Warm illustrated storybook style, soft colors, friendly characters, cozy atmosphere."

model_presets:
  flux_schnell_fp8:
    enabled: false
    backend: "comfyui"
    workflow: "workflows/flux_schnell_fp8_4step.json"
    quantization: "fp8"
    acceleration_mode: "schnell"
    recommended_width: 576
    recommended_height: 1024
    recommended_steps: 4
    guidance_scale: 0.0
    sampler: "euler"
    scheduler: "simple"

  z_image_turbo_gguf:
    enabled: true
    backend: "comfyui"
    workflow: "workflows/z_image_turbo_gguf_6step.json"
    quantization: "gguf"
    acceleration_mode: "turbo"
    recommended_width: 576
    recommended_height: 1024
    recommended_steps: 6
    guidance_scale: 0.0
    sampler: "euler"
    scheduler: "simple"

acceleration_presets:
  schnell_4step:
    acceleration_mode: "schnell"
    steps: 4
    guidance_scale: 0.0
    sampler: "euler"
    scheduler: "simple"
  turbo_6step:
    acceleration_mode: "turbo"
    steps: 6
    guidance_scale: 0.0
    sampler: "euler"
    scheduler: "simple"
  distilled_6step:
    acceleration_mode: "distilled"
    steps: 6
    guidance_scale: 0.0
    sampler: "euler"
    scheduler: "simple"

lora_presets:
  none:
    enabled: false

comfyui:
  url: "http://127.0.0.1:8188"
  workflow_path: "workflows/z_image_turbo_gguf_6step.json"
  timeout_sec: 300
  poll_interval_sec: 2
  node_map:
    positive_prompt: "6.inputs.text"
    negative_prompt: "7.inputs.text"
    width: "5.inputs.width"
    height: "5.inputs.height"
    seed: "3.inputs.seed"
    steps: "3.inputs.steps"
    cfg: "3.inputs.cfg"
    sampler: "3.inputs.sampler_name"
    scheduler: "3.inputs.scheduler"
    save_image_prefix: "9.inputs.filename_prefix"
