# Универсальные настройки пайплайна генерации видео

project_name: "ai_video_project"
aspect_ratio: "9:16"

# Провайдер LLM для генерации сценария и промптов (openai, groq, gemini)
llm_provider: "gemini"
llm_model: "gemini-2.5-flash"

# Настройки озвучки (TTS)
tts:
  backend: "silero"              # f5_tts | fish_speech | cosyvoice | local_tts_api | silero | audio_file | none
  fallback_backend: "silero"
  mode: "per_scene"              # per_scene | full_script
  quality_preset: "balanced"     # draft | balanced | high

  clear_memory_after_tts: true
  unload_tts_model_after_generation: true
  run_tts_before_visuals: true

  language: "ru"
  voice: "default"
  speed: 1.0
  emotion: "neutral"             # neutral | dramatic | calm | energetic | documentary
  sample_rate: 24000
  format: "wav"
  normalize_text: true

  # Для voice cloning
  reference_audio_path: "voices/reference.wav"
  reference_text: ""
  use_voice_clone: true

  # Chunking
  max_chars_per_chunk: 350
  pause_between_chunks_ms: 250

  # Local API fallback
  local_tts_api_url: "http://127.0.0.1:8020/tts"

  # Бэкенд-специфичные настройки
  f5_tts:
    model: "F5-TTS"
    device: "cuda"
    dtype: "float16"
    nfe_step: 32
    cfg_strength: 2.0
    sway_sampling_coef: -1.0
    speed: 1.0

  fish_speech:
    model_path: "checkpoints/fish-speech"
    device: "cuda"
    dtype: "float16"
    temperature: 0.7
    top_p: 0.8
    repetition_penalty: 1.1

  cosyvoice:
    model_path: "checkpoints/cosyvoice"
    device: "cuda"
    dtype: "float16"

  silero:
    voice: "baya"
    sample_rate: 24000
    speed: "medium"

  audio_file:
    path: "input_audio/voiceover.wav"

  replacements:
    "AI": "искусственный интеллект"
    "API": "эй-пи-ай"
    "URL": "ссылка"
    "404": "четыреста четыре"
    "403": "четыреста три"

# Настройки постобработки голоса
audio_postprocess:
  enabled: true
  normalize_loudness: true
  target_lufs: -14
  remove_silence: true
  max_silence_ms: 500
  add_compressor: true
  noise_reduction: false


# Настройки генератора визуальных промптов
visual_generator:
  mode: "image_prompts"
  style_preset: "cinematic_realistic"

# Настройки рендеринга и генерации визуалов по умолчанию
render:
  # Бэкенд визуализации: comfyui | local_api | image_folder | stock_video | none
  visual_backend: "comfyui"
  fallback_backend: "image_folder"
  model_preset: "z_image_turbo_gguf"
  acceleration_mode: "turbo"    # none | turbo | schnell | lcm | lightning | hyper | distilled

  # Разрешение генерации картинок (рекомендуется пониженное для экономии VRAM)
  image_width: 576
  image_height: 1024

  # Итоговое разрешение видео
  final_width: 1080
  final_height: 1920

  steps: 6
  guidance_scale: 0.0
  seed: -1
  sampler: "euler"
  scheduler: "simple"

  # Настройки LoRA
  lora_preset: "none"
  lora_strength: 0.7

  # Пресет анимации камеры для статических изображений:
  #   - none (без движения)
  #   - slow_zoom_in (плавный наезд)
  #   - slow_zoom_out (плавный отъезд)
  #   - pan_left (плавное панорамирование влево)
  #   - pan_right (плавное панорамирование вправо)
  #   - handheld_light (легкое покачивание камеры с рук)
  motion_preset: "slow_zoom_in"
  captions_enabled: true

  # Настройки бэкендов
  comfyui_url: "http://127.0.0.1:8188"
  comfyui_workflow_path: "workflows/flux_schnell_fp8_4step.json"

  local_image_api_url: "http://127.0.0.1:8000/txt2img"
  image_folder_path: "input_images"

  stock_video_provider: "pexels"
  stock_video_orientation: "portrait"

  # Настройки отказоустойчивости (Fallback) и очистки кэша
  fallback_to_black: true
  clear_cuda_cache_between_scenes: true

# Настройки авторизации Hugging Face (для Colab)
huggingface:
  token_env: "HF_TOKEN"
  use_auth_token: true

# Настройки отображения субтитров
captions:
  font_size: 90
  font_color: "white"
  font_face: "Arial-Bold"
  stroke_width: 3
  stroke_color: "black"
  position: "bottom_center"

# Художественные пресеты стилей для генерации промптов
style_presets:
  cinematic_realistic: "Cinematic realistic style, detailed composition, realistic lighting, professional video frame, high detail, natural textures."
  documentary: "Documentary style, authentic real-world look, natural lighting, journalistic, realistic details."
  luxury_commercial: "Premium commercial look, clean elegant composition, polished lighting, high-end advertising style."
  educational_clean: "Clean educational visual style, minimal background, clear subject, readable composition."
  dark_dystopian: "Dark near-future atmosphere, cinematic shadows, cold lighting, subtle technology, unsettling mood."
  kids_storybook: "Warm illustrated storybook style, soft colors, friendly characters, cozy atmosphere."

