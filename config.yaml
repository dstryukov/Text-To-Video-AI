# Пресеты параметров шагов и сэмплеров (ускорение генерации)
acceleration_presets:
  schnell_4step:
    acceleration_mode: "schnell"
    steps: 4
    guidance_scale: 0.0
    sampler: "euler"
    scheduler: "simple"

  turbo_4step:
    acceleration_mode: "turbo"
    steps: 4
    guidance_scale: 0.0
    sampler: "euler"
    scheduler: "simple"

  turbo_6step:
    acceleration_mode: "turbo"
    steps: 6
    guidance_scale: 0.0
    sampler: "euler"
    scheduler: "simple"

  distilled_6step:
    acceleration_mode: "distilled"
    steps: 6
    guidance_scale: 0.0
    sampler: "euler"
    scheduler: "simple"

  lcm_6step:
    acceleration_mode: "lcm"
    steps: 6
    guidance_scale: 1.0
    sampler: "lcm"
    scheduler: "sgm_uniform"
    lora_required: true

  lightning_4step:
    acceleration_mode: "lightning"
    steps: 4
    guidance_scale: 1.0
    sampler: "euler"
    scheduler: "sgm_uniform"
    lora_required: true

  hyper_8step:
    acceleration_mode: "hyper"
    steps: 8
    guidance_scale: 1.0
    sampler: "euler"
    scheduler: "sgm_uniform"
    lora_required: true

# Пресеты LoRA моделей
lora_presets:
  none:
    enabled: false

  cinematic:
    enabled: true
    lora_name: "cinematic_lora.safetensors"
    strength_model: 0.6
    strength_clip: 0.6

  photoreal:
    enabled: true
    lora_name: "photoreal_lora.safetensors"
    strength_model: 0.5
    strength_clip: 0.5

  anime:
    enabled: true
    lora_name: "anime_lora.safetensors"
    strength_model: 0.7
    strength_clip: 0.7

# Динамический маппинг нод ComfyUI
comfyui:
  url: "http://127.0.0.1:8188"
  workflow_path: "workflows/flux_schnell_fp8_4step.json"
  timeout_sec: 300
  poll_interval_sec: 2

  node_map:
    positive_prompt: "6.inputs.text"
    negative_prompt: "7.inputs.text"
    width: "5.inputs.width"
    height: "5.inputs.height"
    seed: "3.inputs.seed"
    steps: "3.inputs.steps"
    cfg: "3.inputs.cfg"
    sampler: "3.inputs.sampler_name"
    scheduler: "3.inputs.scheduler"
    lora_name: "10.inputs.lora_name"
    lora_strength_model: "10.inputs.strength_model"
    lora_strength_clip: "10.inputs.strength_clip"
    save_image_prefix: "9.inputs.filename_prefix"

# Пресеты качества для TTS (например, F5-TTS)
tts_quality_presets:
  draft:
    f5_tts:
      nfe_step: 8
  balanced:
    f5_tts:
      nfe_step: 16
  high:
    f5_tts:
      nfe_step: 32

